# PostgreSQL Client Authentication Configuration File
# Managed by the MuggleTalent repository — mounted into the db container via docker-compose.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix-domain socket connections inside the container
local   all             all                                     trust

# Connections originating from inside the container itself
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Docker bridge / private networks.
# Required when the Laravel app runs on the host and connects through the published
# 5432 port — Docker NAT presents the client as the bridge gateway (e.g. 172.18.0.1).
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256
host    all             all             10.0.0.0/8              scram-sha-256

# Other Docker Compose services on the internal network (use DB_HOST=db from those containers)
host    all             all             all                     scram-sha-256
